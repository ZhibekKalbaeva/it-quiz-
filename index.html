<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IT билим – тест | Кыргызча оюн</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* небольшая аккуратность, текст можно выделять */
        }

        body {
            background: linear-gradient(145deg, #0b2b26 0%, #0a1f1a 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Manrope', 'Noto Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* карточка игры */
        .game-container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .quiz-card {
            background: #fef9e8;
            border-radius: 48px;
            padding: 25px 28px 35px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a5f4b, #0e3e31);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .sub {
            text-align: center;
            color: #2d5a4a;
            font-weight: 500;
            border-bottom: 2px solid #d0e2d6;
            display: inline-block;
            width: auto;
            margin: 0 auto 20px;
            padding-bottom: 8px;
            font-size: 1rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #e9f2ef;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #1e4e3f;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 20px 0 25px;
            line-height: 1.3;
            background: #ffffffd9;
            padding: 20px 20px;
            border-radius: 40px;
            box-shadow: inset 0 1px 4px #0001, 0 4px 8px #0001;
            color: #1a2f28;
            text-align: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        .option-btn {
            background: white;
            border: 2px solid #cde2da;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            color: #1c3f35;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover:not(:disabled) {
            background: #c8f0e4;
            border-color: #2f8b70;
            transform: scale(0.99);
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        .prefix {
            background: #264e41;
            color: white;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            font-weight: bold;
        }

        .correct-highlight {
            background: #b9f6ca !important;
            border-color: #2e7d32 !important;
            color: #1c441e;
        }

        .wrong-highlight {
            background: #ffdad6 !important;
            border-color: #c62828 !important;
            color: #a51b1b;
            text-decoration: line-through;
        }

        .disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .next-btn, .restart-btn {
            background: #1f6e58;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 14px 24px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            margin-top: 10px;
            box-shadow: 0 5px 0 #0b3529;
        }

        .next-btn:active, .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0b3529;
        }

        .restart-btn {
            background: #3a6b5e;
            box-shadow: 0 5px 0 #1f4036;
            margin-top: 15px;
        }

        .result-area {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            background: #eef3f0;
            padding: 20px;
            border-radius: 40px;
            margin: 15px 0;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #cbdcd5;
        }

        @media (max-width: 550px) {
            .quiz-card {
                padding: 20px;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .option-btn {
                font-size: 0.95rem;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="quiz-card">
        <h1>💻 IT билим ⚡</h1>
        <div style="text-align: center;">
            <div class="sub">Кыргызча оюн — IT дүйнөсү</div>
        </div>

        <div class="stats">
            <span>📋 Суроо: <span id="currentQ">1</span> / <span id="totalQ">5</span></span>
            <span>🏆 Упай: <span id="scoreValue">0</span></span>
        </div>

        <div id="quizArea">
            <!-- суроолор динамикалык жүктөлөт -->
        </div>

        <footer>
            🖱️ Сиздин IT билимиңизди текшериңиз
        </footer>
    </div>
</div>

<script>
    // ------------- ИТ-суроолор (кыргызча) -------------
    const questions = [
        {
            text: "Веб-барактардын түзүлүшү үчүн колдонулган негизги тил кайсы?",
            options: ["Python", "HTML", "C++", "Java"],
            correct: 1  // индекс 0-ден баштап, HTML
        },
        {
            text: "'Которулма тил' деген эмне? (Compiler же Interpreter жөнүндө)",
            options: ["Булак кодду түз аткаруучу программа", "Кодду машина тилине которуучу", "Тармактык протокол", "Маалымат базасынын тили"],
            correct: 1  // которуучу - compiler/interpreter маанисинде
        },
        {
            text: "Төмөнкүлөрдүн кайсынысы маалымат базасын башкаруу системасы (МББС)?",
            options: ["MySQL", "React", "Docker", "Figma"],
            correct: 0  // MySQL
        },
        {
            text: "Git деген эмне?",
            options: ["Браузер", "Версияларды көзөмөлдөө тутуму", "Операциялык система", "HTML фреймворк"],
            correct: 1
        },
        {
            text: "'API' кыскармасы кандай маанини билдирет?",
            options: ["Application Programming Interface", "Advanced Protocol Internet", "Apple Private Identity", "Automated Program Input"],
            correct: 0
        }
    ];

    // кошумча кооздук: кыргызча комментарийлер
    let currentIndex = 0;       // учурдагы суроо (0-негиз)
    let score = 0;
    let answerLock = false;      // бир жооп берилди берилди экинчи жолу басууга тыюу
    let totalQuestions = questions.length;

    // DOM элементтер
    const quizArea = document.getElementById("quizArea");
    const currentQSpan = document.getElementById("currentQ");
    const totalQSpan = document.getElementById("totalQ");
    const scoreSpan = document.getElementById("scoreValue");

    function updateStatsUI() {
        currentQSpan.textContent = currentIndex + 1;
        totalQSpan.textContent = totalQuestions;
        scoreSpan.textContent = score;
    }

    // суроону көрсөтүү
    function renderQuestion() {
        answerLock = false;
        const q = questions[currentIndex];
        if (!q) return;

        let html = `
            <div class="question-text">🤔 ${escapeHtml(q.text)}</div>
            <div class="options" id="optionsContainer">
        `;

        // опцияларды кошуу (A, B, C, D префикстери менен)
        const prefixes = ["🇦", "🇧", "🇨", "🇩"];
        q.options.forEach((opt, idx) => {
            html += `
                <button class="option-btn" data-opt-index="${idx}">
                    <span class="prefix">${prefixes[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </button>
            `;
        });

        html += `</div>`;
        html += `<button class="next-btn" id="nextButton">▶ Кийинки суроо</button>`;

        quizArea.innerHTML = html;

        // бардык опция баскычтарына event listener кошуу
        const optBtns = document.querySelectorAll('.option-btn');
        optBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerLock) return; // эгер жооп берилген болсо
                const selectedIdx = parseInt(btn.dataset.optIndex);
                handleAnswer(selectedIdx, btn);
            });
        });

        // "кийинки" баскыч
        const nextBtn = document.getElementById('nextButton');
        nextBtn.addEventListener('click', () => {
            if (!answerLock) {
                // эч жооп берилбесе, эскертүү же эч нерсе кылбайбыз
                showTemporaryMessage("Суроого жооп бериңиз!", "#cc7b2e");
                return;
            }
            // кийинки суроого өтүү же жыйынтык
            if (currentIndex + 1 < totalQuestions) {
                currentIndex++;
                renderQuestion();
                updateStatsUI();
            } else {
                // оюн бүттү, жыйынтыкты көрсөтүү
                showFinalResult();
            }
        });
        updateStatsUI();
    }

    // жоопту иштетүү
    function handleAnswer(selectedIdx, btnElement) {
        const currentQ = questions[currentIndex];
        const isCorrect = (selectedIdx === currentQ.correct);
        if (isCorrect) {
            score++;
            updateStatsUI();
        }

        // бардык опцияларды disable кылуу жана туура / туура эмес түстү көрсөтүү
        const allOptions = document.querySelectorAll('.option-btn');
        allOptions.forEach((opt, idx) => {
            opt.disabled = true;
            opt.classList.add('disabled-opt');
            const optIndex = parseInt(opt.dataset.optIndex);
            if (optIndex === currentQ.correct) {
                opt.classList.add('correct-highlight');
            }
            if (optIndex === selectedIdx && !isCorrect) {
                opt.classList.add('wrong-highlight');
            }
        });

        // эгер туура эмес жооп болсо, туура жоопту да ачык көрсөтүү (кошумча)
        if (!isCorrect) {
            // эч нерсе кошумча, жогорудагы 'correct-highlight' менен көрүнүп турат
            // дагы бир кичине эскертүү элементин көрсөтүү
            showTemporaryMessage(`❌ Туура эмес! Туура жооп: ${escapeHtml(currentQ.options[currentQ.correct])}`, "#b33");
        } else {
            showTemporaryMessage(`✅ Туура! +1 упай`, "#2a7f6e");
        }

        answerLock = true;
        // кийинки баскычка фокус
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) nextBtn.focus();
    }

    // убактылуу кабар (жогорку жакта пайда болот)
    let messageTimeout = null;
    function showTemporaryMessage(msg, bgColor) {
        let msgDiv = document.getElementById('tempMsg');
        if (!msgDiv) {
            msgDiv = document.createElement('div');
            msgDiv.id = 'tempMsg';
            msgDiv.style.position = 'relative';
            msgDiv.style.margin = '10px 0 0 0';
            msgDiv.style.padding = '12px';
            msgDiv.style.borderRadius = '40px';
            msgDiv.style.fontWeight = 'bold';
            msgDiv.style.textAlign = 'center';
            msgDiv.style.transition = '0.2s';
            const quizCard = document.querySelector('.quiz-card');
            quizCard.insertBefore(msgDiv, document.getElementById('quizArea'));
        }
        if (messageTimeout) clearTimeout(messageTimeout);
        msgDiv.textContent = msg;
        msgDiv.style.backgroundColor = bgColor;
        msgDiv.style.color = 'white';
        msgDiv.style.opacity = '1';
        messageTimeout = setTimeout(() => {
            if (msgDiv) msgDiv.style.opacity = '0';
            setTimeout(() => {
                if (msgDiv && msgDiv.parentNode) msgDiv.remove();
            }, 300);
        }, 1800);
    }

    function showFinalResult() {
        let percent = Math.round((score / totalQuestions) * 100);
        let resultMessage = "";
        if (percent === 100) resultMessage = "💎 Мыкты! Сен IT сыйкырчысың!";
        else if (percent >= 70) resultMessage = "🏅 Жакшы натыйжа! Дагы билимди чыңда!";
        else if (percent >= 40) resultMessage = "📚 Жакшы, бирок көнүгүү керек. Күчүңдү сына!";
        else resultMessage = "🌱 Баштаңыз! IT терминдерин окуп, кайра келиңиз.";

        const finalHTML = `
            <div class="result-area">
                🎉 Оюн бүттү! 🎉<br>
                Сиздин упай: ${score} / ${totalQuestions} (${percent}%)<br>
                <span style="font-size:1.2rem;">✨ ${resultMessage} ✨</span>
            </div>
            <button class="restart-btn" id="restartGameBtn">🔄 Оюнду кайра баштоо</button>
        `;
        quizArea.innerHTML = finalHTML;
        const restartBtn = document.getElementById('restartGameBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                // оюнду башынан баштоо
                currentIndex = 0;
                score = 0;
                answerLock = false;
                updateStatsUI();
                renderQuestion();
                // убактылуу кабарды тазалоо
                const msgDiv = document.getElementById('tempMsg');
                if (msgDiv) msgDiv.remove();
            });
        }
        // stats жаңыртуу
        currentQSpan.textContent = totalQuestions;
        scoreSpan.textContent = score;
    }

    // HTML injection коргонуу
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ишке киргизүү
    renderQuestion();
    updateStatsUI();
</script>
</body>
</html>
